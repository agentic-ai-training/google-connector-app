name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify deployment source is the triggered immutable commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Label deployments with the immutable commit
        run: |
          printf '%s' "$GITHUB_SHA" | npx -y @railway/cli@latest variable set DEPLOYMENT_VERSION --stdin --service google-connector-app --skip-deploys >/dev/null
          printf '%s' "$GITHUB_SHA" | npx -y @railway/cli@latest variable set DEPLOYMENT_VERSION --stdin --service google-connector-worker --skip-deploys >/dev/null
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy backend with Railway CLI
        run: npx -y @railway/cli@latest up --service google-connector-app --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy durable worker with Railway CLI
        run: npx -y @railway/cli@latest up --service google-connector-worker --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - uses: actions/setup-python@v6
        with: {python-version: '3.12'}
      - name: Install attestation transport only
        run: pip install 'httpx==0.28.1'
      - name: Attest exact production API and worker deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          CANDIDATE_ATTESTATION_URL: ${{ secrets.CANDIDATE_ATTESTATION_URL }}
          CANDIDATE_DEPLOY_ATTESTATION_TOKEN: ${{ secrets.CANDIDATE_DEPLOY_ATTESTATION_TOKEN }}
          PRODUCTION_COMMIT: ${{ github.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
        run: python scripts/attest_production_deployment.py
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy frontend with current Vercel CLI
        run: npx -y vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
