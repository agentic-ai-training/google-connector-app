name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agent_db
          POSTGRES_USER: agent_user
          POSTGRES_PASSWORD: agent_pass_2024
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U agent_user -d agent_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: pytest tests/ -v
        env:
          RUN_INTEGRATION_TESTS: '1'
          ALLOW_DEV_AUTH: 'true'
      - run: pip install flake8 && flake8 app/ --max-line-length=100
      - name: Run deterministic planner regression set
        run: python scripts/run_golden_evals.py
      - name: Replay Google mutations against the no-network simulator
        run: python scripts/run_workflow_replays.py
      - name: Verify migration downgrade and forward repair
        run: |
          alembic downgrade 002
          alembic upgrade head
          test "$(alembic current | tail -1)" = "005 (head)"
      - name: Validate Docker Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Verify sensitive local files are not tracked or present in history
        run: |
          ! git ls-files | grep -E '(^|/)(\.env|credentials\.json|google-oauth-web\.json|token\.pkl)$'
          ! git log --all --name-only --pretty=format: | grep -E '(^|/)(\.env|credentials\.json|google-oauth-web\.json|token\.pkl)$'

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
