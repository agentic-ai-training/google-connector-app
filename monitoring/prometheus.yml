global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: google-connector-api
    metrics_path: /monitoring/metrics
    static_configs:
      - targets: [api:8000]
  - job_name: google-connector-worker
    metrics_path: /metrics
    static_configs:
      - targets: [worker:8001]
