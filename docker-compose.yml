services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agent_user:agent_pass_2024@postgres:5432/agent_db
      ASYNC_DATABASE_URL: postgresql+asyncpg://agent_user:agent_pass_2024@postgres:5432/agent_db
      OLLAMA_HOST: http://ollama:11434
      EMBEDDED_WORKER_ENABLED: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-development-only-secret-32-bytes}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_pass_2024
    ports: ["5433:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 10
  worker:
    build: .
    env_file: .env
    command: ["python", "-m", "app.runs.worker_entry"]
    expose: ["8001"]
    environment:
      DATABASE_URL: postgresql://agent_user:agent_pass_2024@postgres:5432/agent_db
      ASYNC_DATABASE_URL: postgresql+asyncpg://agent_user:agent_pass_2024@postgres:5432/agent_db
      OLLAMA_HOST: http://ollama:11434
      EMBEDDED_WORKER_ENABLED: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-development-only-secret-32-bytes}
    depends_on:
      api:
        condition: service_healthy
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: [ollama_data:/root/.ollama]
  ollama-init:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        ollama pull nomic-embed-text
    depends_on:
      ollama:
        condition: service_started
  prometheus:
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
  grafana:
    image: grafana/grafana:12.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
  alloy:
    profiles: ["cloud"]
    build:
      context: .
      dockerfile: Dockerfile.alloy
    ports: ["12345:12345"]
    environment:
      API_METRICS_TARGET: api:8000
      WORKER_METRICS_TARGET: worker:8001
      DEPLOYMENT_ENVIRONMENT: local-docker
      GRAFANA_CLOUD_PROMETHEUS_URL: ${GRAFANA_CLOUD_PROMETHEUS_URL:-}
      GRAFANA_CLOUD_PROMETHEUS_USERNAME: ${GRAFANA_CLOUD_PROMETHEUS_USERNAME:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
    volumes:
      - alloy_data:/var/lib/alloy/data
    depends_on:
      api:
        condition: service_started
volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  alloy_data:
